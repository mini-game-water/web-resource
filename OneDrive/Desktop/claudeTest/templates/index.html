<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Hub</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <nav class="navbar">
        <a href="/" class="logo">Game Hub</a>
    </nav>

    <main class="dashboard">
        <h1>Game Hub</h1>
        <p class="subtitle">플레이할 게임을 선택하세요</p>

        <div class="cards">
            <a href="/tetris" class="card">
                <div class="icon">🧱</div>
                <h2>Tetris</h2>
                <p>클래식 블록 쌓기 게임. 줄을 완성하여 점수를 획득하세요!</p>
            </a>

            <a href="/omok" class="card">
                <div class="icon">⚫</div>
                <h2>Omok</h2>
                <p>15×15 보드에서 2인 대전. 먼저 5개를 연속으로 놓으면 승리!</p>
            </a>

            <a href="/chess" class="card">
                <div class="icon">♟️</div>
                <h2>Chess</h2>
                <p>전략의 정수, 체스. 상대의 킹을 체크메이트 하세요!</p>
            </a>
        </div>
    </main>
</body>
</html>
